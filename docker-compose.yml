# Self-contained stack: the Next.js app + a bundled Postgres.
#
#   docker compose up --build      # build + run
#   open http://localhost:8011
#
# Secrets (DB_PASSWORD, ADMIN_PASSWORD, AUTH_SECRET) are read from .env (git-
# ignored) via ${VAR:-fallback}; the fallbacks here are safe, non-secret defaults
# so nothing real is committed. To use an EXTERNAL / managed Postgres instead,
# see DOCKER.md — point the app's DB_* (or DATABASE_URL) at it and drop `db`.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ceo
      # Secret sourced from .env (git-ignored); non-secret fallback for first run.
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ceo_local_password}
      POSTGRES_DB: ceo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceo -d ceo"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "8011"
      # App → bundled Postgres (host pinned to the `db` service so it never
      # accidentally targets a real database). Secrets come from .env below.
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ceo
      DB_USER: ceo
      DB_PASSWORD: ${DB_PASSWORD:-ceo_local_password}
      DB_SCHEMA: ceo
      # Admin login — change per deployment/client (this is how the product is
      # reused). Secrets (password, signing secret) are read from .env; the
      # values here are safe, non-secret fallbacks for a first run.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-ceo@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-amiceo1}
      AUTH_SECRET: ${AUTH_SECRET:-change_me_to_a_long_random_secret}
    ports:
      - "8011:8011"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:8011/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  pgdata:
